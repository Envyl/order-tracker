workflows:
  order-tracker-ipa:
    name: Order Tracker IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "ios/OrderTracker.xcodeproj"
        XCODE_SCHEME: "OrderTracker"
        BUNDLE_ID: "com.personal.ordertracker"
    scripts:
      - name: Build IPA (unsigned/dev style for Sideloadly re-sign)
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/build/OrderTracker.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive
          mkdir -p "$CM_BUILD_DIR/build/ipa/Payload"
          cp -R "$CM_BUILD_DIR/build/OrderTracker.xcarchive/Products/Applications/OrderTracker.app" \
            "$CM_BUILD_DIR/build/ipa/Payload/"
          (
            cd "$CM_BUILD_DIR/build/ipa"
            zip -r "$CM_BUILD_DIR/build/OrderTracker.ipa" Payload
          )
    artifacts:
      - build/OrderTracker.ipa
      - build/OrderTracker.xcarchive/**/*
