workflows:
  order-tracker-ipa:
    name: Order Tracker IPA
    # Native iOS app lives under ios/ (repo root also has specs/, .specify/, etc.)
    working_directory: ios
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "OrderTracker.xcodeproj"
        XCODE_SCHEME: "OrderTracker"
        BUNDLE_ID: "com.personal.ordertracker"
    scripts:
      - name: Show Xcode project
        script: |
          set -e
          pwd
          ls -la
          xcodebuild -list -project "$XCODE_PROJECT"
      - name: Build IPA (unsigned/dev style for Sideloadly re-sign)
        script: |
          set -e
          # Artifact paths: with working_directory=ios, relative globs are under ios/.
          # Also publish under $CM_BUILD_DIR/build with absolute artifact entries.
          ARCHIVE_PATH="$CM_BUILD_DIR/build/OrderTracker.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ipa"
          LOCAL_BUILD_DIR="$CM_BUILD_DIR/ios/build"
          mkdir -p "$IPA_DIR/Payload" "$LOCAL_BUILD_DIR"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive
          cp -R "$ARCHIVE_PATH/Products/Applications/OrderTracker.app" \
            "$IPA_DIR/Payload/"
          (
            cd "$IPA_DIR"
            zip -r "$CM_BUILD_DIR/build/OrderTracker.ipa" Payload
          )
          cp "$CM_BUILD_DIR/build/OrderTracker.ipa" "$LOCAL_BUILD_DIR/OrderTracker.ipa"
          ls -la "$CM_BUILD_DIR/build/OrderTracker.ipa" "$LOCAL_BUILD_DIR/OrderTracker.ipa"
    artifacts:
      # Absolute paths (reliable with working_directory)
      - $CM_BUILD_DIR/build/OrderTracker.ipa
      - $CM_BUILD_DIR/build/OrderTracker.xcarchive
      # Relative to working_directory (ios/)
      - build/OrderTracker.ipa
      - /tmp/xcodebuild_logs/*.log
